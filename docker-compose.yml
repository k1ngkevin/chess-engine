services:
  backend:
    image: chess-analyzer-backend:dev
    build:
      context: ./backend
      target: development
    container_name: chess-backend
    ports:
      - "8000:8000"
    environment:
      - STOCKFISH_PATH=/usr/games/stockfish
      - DATABASE_URL=postgresql+psycopg://chess_user:chess_password@db:5432/chess_analyzer
    volumes:
      - ./backend:/app
    depends_on:
      - db

  frontend:
    image: chess-analyzer-frontend:dev
    build:
      context: ./frontend
      target: development
    container_name: chess-frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

  db:
    image: postgres-16
    container-name: chess-db
    environment:
      POSTGRES_DB: chess_analyzer
      POSTGRES_USER: chess_user
      POSTGRES_PASSWORD: chess_password
    ports: -"5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
